<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="novaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f0f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="novaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>

  <circle cx="100" cy="100" r="45" fill="url(#novaGlow)" opacity="0.3"/>

  <g transform="translate(100, 100)">
    <line x1="0" y1="-60" x2="0" y2="-20" stroke="url(#novaGradient)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="20" x2="0" y2="60" stroke="url(#novaGradient)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-60" y1="0" x2="-20" y2="0" stroke="url(#novaGradient)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="0" x2="60" y2="0" stroke="url(#novaGradient)" stroke-width="2.5" stroke-linecap="round"/>

    <line x1="-42.4" y1="-42.4" x2="-14.1" y2="-14.1" stroke="url(#novaGradient)" stroke-width="2" stroke-linecap="round"/>
    <line x1="14.1" y1="14.1" x2="42.4" y2="42.4" stroke="url(#novaGradient)" stroke-width="2" stroke-linecap="round"/>
    <line x1="42.4" y1="-42.4" x2="14.1" y2="-14.1" stroke="url(#novaGradient)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-14.1" y1="14.1" x2="-42.4" y2="42.4" stroke="url(#novaGradient)" stroke-width="2" stroke-linecap="round"/>

    <line x1="-20" y1="-54" x2="-7" y2="-18" stroke="url(#novaGradient)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="7" y1="18" x2="20" y2="54" stroke="url(#novaGradient)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="20" y1="-54" x2="7" y2="-18" stroke="url(#novaGradient)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-7" y1="18" x2="-20" y2="54" stroke="url(#novaGradient)" stroke-width="1.5" stroke-linecap="round"/>

    <line x1="-54" y1="-20" x2="-18" y2="-7" stroke="url(#novaGradient)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="18" y1="7" x2="54" y2="20" stroke="url(#novaGradient)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-54" y1="20" x2="-18" y2="7" stroke="url(#novaGradient)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="18" y1="-7" x2="54" y2="-20" stroke="url(#novaGradient)" stroke-width="1.5" stroke-linecap="round"/>

    <line x1="-50" y1="-35" x2="-16" y2="-12" stroke="url(#novaGradient)" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
    <line x1="16" y1="12" x2="50" y2="35" stroke="url(#novaGradient)" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
    <line x1="50" y1="-35" x2="16" y2="-12" stroke="url(#novaGradient)" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
    <line x1="-16" y1="12" x2="-50" y2="35" stroke="url(#novaGradient)" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>

    <line x1="-35" y1="-50" x2="-12" y2="-16" stroke="url(#novaGradient)" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
    <line x1="12" y1="16" x2="35" y2="50" stroke="url(#novaGradient)" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
    <line x1="35" y1="-50" x2="12" y2="-16" stroke="url(#novaGradient)" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
    <line x1="-12" y1="16" x2="-35" y2="50" stroke="url(#novaGradient)" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>

    <circle cx="0" cy="0" r="8" fill="url(#novaGradient)"/>
